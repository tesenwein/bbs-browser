name: Release

# Bei jedem Merge nach main: naechste Patch-Version aus dem letzten Tag
# ableiten, ins Paket schreiben, ein Wheel bauen und als GitHub-Release
# veroeffentlichen. Es wird KEIN Commit nach main gepusht — main ist ein
# geschuetzter Branch; die Version reist ueber Tag + Release. Der Befehl 'up'
# laedt genau dieses Release herunter.
#
# In einem Pull Request nach main laeuft alles ausser dem Veroeffentlichen
# (Validierung); veroeffentlicht wird nur beim Push auf main selbst.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine next version
        id: ver
        run: |
          LATEST="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -n "$LATEST" ]; then
            NEXT="$(python tools/bump_version.py --next "$LATEST")"
          else
            NEXT="$(python tools/bump_version.py --next)"
          fi
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT} (latest tag: ${LATEST:-none})"

      - name: Write version into package
        run: python tools/bump_version.py --set "${{ steps.ver.outputs.version }}"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "v${VERSION}" dist/* \
            --title "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --generate-notes
